<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40" aria-hidden="true">
  <defs>
    <linearGradient id="sc-mark-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5b8cff"/>
      <stop offset="55%" stop-color="#6e6cff"/>
      <stop offset="100%" stop-color="#a64bff"/>
    </linearGradient>
    <linearGradient id="sc-mark-stroke" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e8efff"/>
    </linearGradient>
    <radialGradient id="sc-mark-glow" cx="0.78" cy="0.22" r="0.6">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
