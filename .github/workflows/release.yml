# Automated release powered by Changesets.
#
# How it works:
# 1. Contributors run `pnpm changeset` and commit a `.changeset/*.md` file
#    on their PR describing the change (patch/minor/major).
# 2. When that PR merges into `main`, this workflow runs.
# 3. If pending changesets exist, the action opens (or updates) a "Version
#    Packages" PR that bumps `package.json`, regenerates `CHANGELOG.md`, and
#    deletes the consumed changeset files.
# 4. When the maintainer merges the "Version Packages" PR, this workflow
#    runs again and publishes the new version to npm + creates a GitHub
#    release.
#
# Hardening:
# - All third-party actions are SHA-pinned. Comment after each pin records
#   the human-readable tag for review purposes.
# - The publish step runs in the `npm-publish` GitHub Environment with
#   required reviewers; NPM_TOKEN (if used) is an environment secret.
# - Trusted publishing (npm OIDC) is the recommended path: once configured
#   on npmjs.com, NPM_TOKEN can be removed and the `id-token: write`
#   permission below is sufficient.
name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Version & publish
    runs-on: ubuntu-latest
    if: github.repository == 'arshad-shah/swiftchart'
    environment: npm-publish
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@a15d269cd4658e1107c09f1fabf4cbd7bd1f308a  # v4.4.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Validate (typecheck + lint + test + build + size)
        run: pnpm --filter @arshad-shah/swift-chart validate

      - name: Upgrade bundled npm for OIDC support
        run: npm install -g npm@latest

      - name: Create release PR or publish to npm
        id: changesets
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b  # v1.8.0
        with:
          publish: pnpm release
          title: 'chore(release): version packages'
          commit: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
