name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18.18', '20', '22']
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @arshad-shah/swift-chart typecheck
      - run: pnpm --filter @arshad-shah/swift-chart lint
      - run: pnpm --filter @arshad-shah/swift-chart test
      - run: pnpm --filter @arshad-shah/swift-chart build

  package-checks:
    name: Package validation
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @arshad-shah/swift-chart build
      - run: pnpm --filter @arshad-shah/swift-chart publint
      - run: pnpm --filter @arshad-shah/swift-chart attw
      - run: pnpm --filter @arshad-shah/swift-chart size
